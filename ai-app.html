<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hawaii Quiz</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 40px 20px;
      background: linear-gradient(180deg, #a9def9 0%, #e4c1f9 45%, #fff1b6 100%);
      min-height: 100vh;
      color: #2f3a44;
    }

    .box {
      background: rgba(255, 255, 255, 0.92);
      padding: 35px 28px;
      margin: 40px auto;
      width: 90%;
      max-width: 500px;
      border-radius: 24px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
    }

    h1 {
      color: #ff6b6b;
      margin-bottom: 10px;
      font-size: 2.4rem;
    }

    .subtitle {
      color: #5c6770;
      margin-bottom: 28px;
      font-size: 1.05rem;
    }

    #question {
      font-size: 1.35rem;
      font-weight: bold;
      margin-bottom: 25px;
      color: #118ab2;
    }

    button {
      display: block;
      margin: 12px auto;
      padding: 14px 16px;
      cursor: pointer;
      width: 100%;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: bold;
      color: white;
      background: linear-gradient(135deg, #ff6b6b, #f4a261);
      transition: transform 0.2s ease, opacity 0.2s ease;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.12);
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    #result {
      margin-top: 20px;
      font-size: 1.1rem;
      font-weight: bold;
      color: #06d6a0;
      min-height: 24px;
    }

    .nav-links {
      margin-top: 25px;
    }

    .nav-links a {
      display: inline-block;
      margin: 8px;
      padding: 10px 18px;
      border-radius: 999px;
      background: white;
      color: #118ab2;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
    }

    .nav-links a:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>Hawaii Quiz 🌺</h1>
    <p class="subtitle">Test your Hawaii travel knowledge!</p>

    <p id="question">Question will go here</p>

    <button onclick="checkAnswer('a')" id="a"></button>
    <button onclick="checkAnswer('b')" id="b"></button>
    <button onclick="checkAnswer('c')" id="c"></button>

    <p id="result"></p>

   <div class="nav-links">
  <a href="index.html">Home</a>
  <a href="resume.html">Resume</a>
  <a href="scratch.html">Hawaii Page</a>
</div>
  </div>

  <script>
    let currentQuestion = 0;
    let score = 0;

    const questions = [
      {
        question: "Which Hawaiian island is known for volcanoes?",
        a: "Kauai",
        b: "Big Island",
        c: "Oahu",
        correct: "b"
      },
      {
        question: "Which island is famous for the Road to Hana?",
        a: "Maui",
        b: "Oahu",
        c: "Kauai",
        correct: "a"
      },
      {
        question: "Where is the North Shore known for surfing?",
        a: "Big Island",
        b: "Maui",
        c: "Oahu",
        correct: "c"
      }
    ];

    function loadQuestion() {
      let q = questions[currentQuestion];
      document.getElementById("question").innerHTML = q.question;
      document.getElementById("a").innerHTML = q.a;
      document.getElementById("b").innerHTML = q.b;
      document.getElementById("c").innerHTML = q.c;
      document.getElementById("result").innerHTML = "";
    }

    function checkAnswer(answer) {
      let q = questions[currentQuestion];

      if (answer === q.correct) {
        score++;
        document.getElementById("result").innerHTML = "Correct!";
      } else {
        document.getElementById("result").innerHTML = "Oops! The correct answer was: " + q[q.correct];
      }

      setTimeout(() => {
        currentQuestion++;

        if (currentQuestion < questions.length) {
          loadQuestion();
        } else {
          document.querySelector(".box").innerHTML = `
  <h1>Quiz Complete 🌴</h1>
  <p class="subtitle">You got <strong>${score}</strong> out of <strong>${questions.length}</strong> correct!</p>
  <div class="nav-links">
    <a href="ai-app.html">Play Again</a>
    <a href="index.html">Home</a>
    <a href="resume.html">Resume</a>
    <a href="scratch.html">Hawaii Page</a>
  </div>
`;
        }
      }, 900);
    }

    loadQuestion();
  </script>

</body>
</html>
